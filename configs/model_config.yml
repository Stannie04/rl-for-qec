dqn:
  batch_size: 256
  gamma: 0.99
  epsilon_start: 0.1
  epsilon_end: 0.1
  epsilon_decay: 10000
  tau: 0.005
  train_frequency: 4
  learning_rate: 0.0001
  replay_buffer_capacity: 10000
  hidden_channels_GCN:
    - 32
    - 128
    - 256
    - 512
    - 512
    - 256
    - 256
  hidden_channels_MLP:
    - 256
    - 128
    - 64

sac:
  batch_size: 64
  replay_buffer_capacity: 500000
  initial_alpha: 0.5
  gamma: 0.99
  tau: 0.005

  # Used for the dueling MLPs + GRU in the neural BP decoder
  neural_bp_iterations: 10
  neural_bp_hidden_dim: 128

  hidden_layers_gnn:
    - 32
    - 128
    - 64

  hidden_layers_mlp:
    - 128
    - 64

  train_frequency: 1
  discrete: True

  actor_learning_rate: 0.0001
  critic_learning_rate: 0.0001
  alpha_learning_rate: 0.0001

  use_action_mask: False
  use_noop_head: False
  use_neural_bp: True
  use_per: True
  inference_threshold: 0.2

moe:
  moe_experts:
#    - pretrained_encoder
    - sac
    - bp
    - bp_osd
    - pretrained_encoder

  moe_hidden_layers_gnn:
    - 32
    - 128
    - 64

  moe_hidden_layers_mlp:
    - 128
    - 64

  moe_learning_rate: 0.0001
  latency_penalty_factor: 10 # 0 for no penalty

encoder:
  encoder_learning_rate: 0.0001
  encoder_hidden_dim: 128